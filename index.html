<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ModelArena is the operator console and voting experience for running blind model evaluation campaigns."
    />
    <meta name="application-name" content="ModelArena" />
    <link rel="icon" type="image/png" href="/favicon.png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" href="/favicon-light.png" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>ModelArena</title>
    <script type="speculationrules">
      {
        "prefetch": [
          {
            "source": "document",
            "where": { "href_matches": "/campaign/*" },
            "eagerness": "conservative"
          }
        ],
        "prerender": [
          {
            "source": "list",
            "urls": ["/", "/dashboard", "/models", "/team-activity"],
            "eagerness": "moderate"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
