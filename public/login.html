<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="ïdea Bench operator sign in" />
  <meta name="robots" content="noindex" />
  <title>Sign in — ïdea Bench</title>
  <link rel="icon" type="image/png" href="/favicon.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="/favicon-light.png" media="(prefers-color-scheme: light)" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      background: #FEFEF5; color: #0B0F2B;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 16px; line-height: 1.5;
    }
    main { width: 100%; max-width: 24rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .brand { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; text-align: center; }
    .mark {
      width: 3.5rem; height: 3.5rem;
      background: url('/logo-brand.png') center / contain no-repeat;
    }
    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
    .sub { font-size: 0.875rem; color: #64697A; margin-top: 0.25rem; }
    .card {
      background: #FFFFFF; border: 1px solid #E3E6F1;
      border-radius: 0.75rem; box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      overflow: hidden;
    }
    form { display: flex; flex-direction: column; gap: 1rem; padding: 1.5rem; }
    .field { display: flex; flex-direction: column; gap: 0.5rem; }
    label {
      font-size: 0.625rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.05em; color: #64697A;
    }
    input[type="password"] {
      width: 100%; height: 2.5rem;
      padding: 0 1rem;
      border: 1px solid #E3E6F1; border-radius: 0.5rem;
      background: #FFFFFF; color: #0B0F2B;
      font-size: 0.875rem; font-family: inherit;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    input[type="password"]:focus {
      border-color: #0B0F2B;
      box-shadow: 0 0 0 2px rgba(67,97,238,0.18);
    }
    button, .btn {
      width: 100%; height: 2.5rem;
      border: 0; border-radius: 9999px;
      background: #0B0F2B; color: #FEFEF5;
      font-size: 0.875rem; font-weight: 500; font-family: inherit;
      cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      transition: background-color 150ms ease, transform 100ms ease, opacity 150ms ease;
    }
    button:hover:not(:disabled), .btn:hover { background: #141A3D; }
    button:active:not(:disabled), .btn:active { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .alt {
      display: flex; flex-direction: column; gap: 0.5rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid #E3E6F1;
      background: rgba(227,230,241,0.35);
    }
    .alt-row {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.625rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.05em; color: rgba(100,105,122,0.8);
    }
    .alt-row::before, .alt-row::after {
      content: ''; flex: 1; height: 1px; background: #E3E6F1;
    }
    .alt-btns { display: flex; gap: 0.5rem; }
    .btn-ghost {
      flex: 1; height: 2rem;
      background: transparent; color: #0B0F2B;
      border: 1px solid #E3E6F1;
      font-size: 0.8125rem;
    }
    .btn-ghost:hover { background: #F4F6FF; }
    .email-row {
      display: flex; gap: 0.375rem;
      margin-top: 0.25rem;
    }
    input[type="email"] {
      flex: 1; height: 2rem;
      padding: 0 0.75rem;
      border: 1px solid #E3E6F1; border-radius: 0.5rem;
      background: #FFFFFF; color: #0B0F2B;
      font-size: 0.8125rem; font-family: inherit;
      outline: none;
    }
    input[type="email"]:focus {
      border-color: #0B0F2B;
      box-shadow: 0 0 0 2px rgba(67,97,238,0.18);
    }
    .btn-send {
      height: 2rem; width: auto; padding: 0 0.875rem;
      font-size: 0.8125rem;
    }
    .notice {
      padding: 0.75rem;
      background: rgba(67,97,238,0.08);
      border: 1px solid rgba(67,97,238,0.25);
      border-radius: 0.5rem;
      font-size: 0.8125rem; color: #334ED8;
    }
    .banner-error {
      padding: 0.75rem;
      background: rgba(185,28,28,0.08);
      border: 1px solid rgba(185,28,28,0.25);
      border-radius: 0.5rem;
      font-size: 0.8125rem; color: #B91C1C;
      margin-bottom: 0;
    }
    .error {
      display: flex; gap: 0.5rem; align-items: flex-start;
      padding: 0.75rem;
      background: rgba(185,28,28,0.08);
      border: 1px solid rgba(185,28,28,0.25);
      border-radius: 0.5rem;
      font-size: 0.8125rem; color: #B91C1C;
    }
    .footer { text-align: center; font-size: 0.75rem; color: #64697A; margin: 0; }
    .hidden { display: none; }
    .spin {
      display: inline-block; width: 0.875rem; height: 0.875rem;
      border: 1.5px solid currentColor; border-right-color: transparent;
      border-radius: 50%; animation: s 700ms linear infinite;
    }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div class="mark" aria-hidden="true"></div>
      <div>
        <h1>ïdea Bench</h1>
        <div class="sub">Operator sign in</div>
      </div>
    </div>
    <div id="banner" class="hidden" role="alert" aria-live="polite"></div>
    <div class="card">
      <form id="f" action="/api/auth/login" method="post" novalidate>
        <div class="field">
          <label for="pw">Password</label>
          <input id="pw" name="password" type="password"
                 autocomplete="current-password" autofocus required
                 placeholder="••••••••" />
        </div>
        <div id="err" class="error hidden" role="alert" aria-live="polite"></div>
        <button id="btn" type="submit">
          <span id="btn-label">Sign in</span>
        </button>
      </form>
      <div class="alt">
        <div class="alt-row">Or continue with</div>
        <div class="alt-btns">
          <a class="btn btn-ghost" href="/api/auth/github">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.42 7.42 0 014 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            GitHub
          </a>
        </div>
        <form class="email-row" action="/api/auth/email-send" method="post" novalidate>
          <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required />
          <button class="btn btn-send" type="submit">Send link</button>
        </form>
      </div>
    </div>
    <p class="footer">Participant voting links don't require this.</p>
  </main>
  <script>
    // Pre-warm: while the user reads the form and types their password,
    // fire fetches at the two endpoints they're most likely to hit right
    // after login (OperatorHome → /api/campaigns, OperatorDashboard →
    // /api/operator/dashboard). Without a cookie the server returns 401
    // and we discard it — but the Vercel Function is now warm so the
    // post-login round-trip skips the cold start. If the user still has
    // a valid operator_session cookie, the Runtime Cache gets populated
    // and the SPA's first data fetch is a hit.
    (function () {
      var warm = function (url) {
        try {
          fetch(url, { credentials: 'same-origin', cache: 'no-store' }).catch(function () {});
        } catch (e) { /* ignore */ }
      };
      warm('/api/campaigns');
      warm('/api/operator/dashboard');
    })();

    // Pre-fetch the SPA shell + entry bundle. Vite emits hashed asset
    // names (index-<hash>.js, vendor-react-<hash>.js …) so this static
    // file can't list them. Workaround: fetch /index.html, parse out the
    // referenced .js / .css URLs, emit <link rel="modulepreload"> for
    // each. By the time the user submits the password the SPA's first
    // chunks are already in cache — post-login first paint skips the
    // bundle download. Cheap (one HTML fetch + N preload hints), idem-
    // potent (force-cache), and silent on failure.
    (function () {
      try {
        fetch('/', { credentials: 'omit', cache: 'force-cache' })
          .then(function (r) { return r.ok ? r.text() : ''; })
          .then(function (html) {
            if (!html) return;
            var re = /<(?:script|link)\b[^>]*(?:src|href)=["']([^"']+\.(?:js|css))["']/g;
            var seen = Object.create(null);
            var m;
            while ((m = re.exec(html))) {
              var url = m[1];
              if (seen[url] || !url.indexOf('http')) continue;
              seen[url] = true;
              var link = document.createElement('link');
              if (url.indexOf('.css', url.length - 4) !== -1) {
                link.rel = 'preload';
                link.as = 'style';
              } else {
                link.rel = 'modulepreload';
              }
              link.href = url;
              document.head.appendChild(link);
            }
          })
          .catch(function () {});
      } catch (e) { /* ignore */ }
    })();
  </script>
  <script>
    (function () {
      var banner = document.getElementById('banner');
      var messages = {
        oauth_invalid_state: 'Sign-in link expired — try again.',
        oauth_state_mismatch: 'Sign-in link couldn’t be verified — try again.',
        oauth_token_exchange_failed: 'GitHub didn’t return a token. Try again.',
        oauth_no_access_token: 'GitHub didn’t return a token. Try again.',
        oauth_user_fetch_failed: 'Couldn’t reach GitHub. Try again.',
        oauth_allowlist_empty: 'Server missing OPERATOR_GITHUB_LOGINS.',
        oauth_forbidden: 'This GitHub account isn’t on the operator allowlist.',
        magic_invalid: 'That magic link isn’t valid.',
        magic_expired: 'That magic link has expired. Request a new one.',
        magic_consumed: 'That magic link was already used. Request a new one.',
        magic_not_configured: 'Email sign-in isn’t configured on this server.'
      };
      try {
        var u = new URL(window.location.href);
        var code = u.searchParams.get('error');
        var sent = u.searchParams.get('sent');
        if (code) {
          banner.className = 'banner-error';
          banner.textContent = messages[code] || ('Sign-in failed (' + code + ').');
        } else if (sent === '1') {
          banner.className = 'notice';
          banner.textContent = 'Check your inbox — the link expires in 15 minutes.';
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
  <script>
    (function () {
      var f = document.getElementById('f');
      var pw = document.getElementById('pw');
      var btn = document.getElementById('btn');
      var label = document.getElementById('btn-label');
      var err = document.getElementById('err');
      function dest() {
        try {
          var u = new URL(window.location.href);
          var r = u.searchParams.get('from');
          return r && r.charAt(0) === '/' && r.charAt(1) !== '/' ? r : '/';
        } catch (e) { return '/'; }
      }
      function fail(msg) {
        err.textContent = msg;
        err.classList.remove('hidden');
        btn.disabled = false;
        label.textContent = 'Sign in';
      }
      function busy() {
        err.classList.add('hidden');
        btn.disabled = true;
        label.innerHTML = '<span class="spin" aria-hidden="true"></span> Signing in…';
      }
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        if (btn.disabled) return;
        var password = pw.value;
        if (!password || !password.trim()) return;
        busy();
        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ password: password }),
          credentials: 'same-origin'
        }).then(function (res) {
          if (res.ok) {
            window.location.href = dest();
            return;
          }
          return res.json().catch(function () { return {}; }).then(function (body) {
            fail((body && body.error) || ('login failed (' + res.status + ')'));
          });
        }).catch(function (e) {
          fail((e && e.message) || 'network error');
        });
      });
    })();
  </script>
</body>
</html>
