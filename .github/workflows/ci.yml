# Continuous integration for every PR and push to main.
#
# The required status-check context is `lint+test+build`; keep it aligned
# with `.github/branch-protection-ruleset.json`.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same ref to keep the queue clean.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint+test+build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS — matches the Vercel production runtime.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify
