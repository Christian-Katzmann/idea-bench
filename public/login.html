<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="ModelArena operator sign in" />
  <meta name="robots" content="noindex" />
  <title>Sign in — ModelArena</title>
  <link rel="icon" type="image/png" href="/favicon.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="/favicon-light.png" media="(prefers-color-scheme: light)" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      background: #F7F6F3; color: #1F1B16;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 16px; line-height: 1.5;
    }
    main { width: 100%; max-width: 24rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .brand { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; text-align: center; }
    .mark {
      width: 3.5rem; height: 3.5rem; border-radius: 0.875rem;
      background: #1F1B16; color: #F7F6F3;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.875rem; font-weight: 400; line-height: 1;
    }
    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.015em; margin: 0; }
    .sub { font-size: 0.875rem; color: #6E6A62; margin-top: 0.25rem; }
    .card {
      background: #FFFFFF; border: 1px solid #E8E6E1;
      border-radius: 0.75rem; box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      overflow: hidden;
    }
    form { display: flex; flex-direction: column; gap: 1rem; padding: 1.5rem; }
    .field { display: flex; flex-direction: column; gap: 0.5rem; }
    label {
      font-size: 0.625rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.05em; color: #6E6A62;
    }
    input[type="password"] {
      width: 100%; height: 2.5rem;
      padding: 0 1rem;
      border: 1px solid #E8E6E1; border-radius: 0.5rem;
      background: #FFFFFF; color: #1F1B16;
      font-size: 0.875rem; font-family: inherit;
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    input[type="password"]:focus {
      border-color: #1F1B16;
      box-shadow: 0 0 0 2px rgba(4,120,87,0.18);
    }
    button {
      width: 100%; height: 2.5rem;
      border: 0; border-radius: 9999px;
      background: #1F1B16; color: #F7F6F3;
      font-size: 0.875rem; font-weight: 500; font-family: inherit;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      transition: background-color 150ms ease, transform 100ms ease, opacity 150ms ease;
    }
    button:hover:not(:disabled) { background: #2B2620; }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      display: flex; gap: 0.5rem; align-items: flex-start;
      padding: 0.75rem;
      background: rgba(185,28,28,0.08);
      border: 1px solid rgba(185,28,28,0.25);
      border-radius: 0.5rem;
      font-size: 0.8125rem; color: #B91C1C;
    }
    .footer { text-align: center; font-size: 0.75rem; color: #6E6A62; margin: 0; }
    .hidden { display: none; }
    .spin {
      display: inline-block; width: 0.875rem; height: 0.875rem;
      border: 1.5px solid currentColor; border-right-color: transparent;
      border-radius: 50%; animation: s 700ms linear infinite;
    }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div class="mark" aria-hidden="true">/</div>
      <div>
        <h1>ModelArena</h1>
        <div class="sub">Operator sign in</div>
      </div>
    </div>
    <div class="card">
      <form id="f" action="/api/auth/login" method="post" novalidate>
        <div class="field">
          <label for="pw">Password</label>
          <input id="pw" name="password" type="password"
                 autocomplete="current-password" autofocus required
                 placeholder="••••••••" />
        </div>
        <div id="err" class="error hidden" role="alert" aria-live="polite"></div>
        <button id="btn" type="submit">
          <span id="btn-label">Sign in</span>
        </button>
      </form>
    </div>
    <p class="footer">Participant voting links don't require this.</p>
  </main>
  <script>
    // Pre-warm: while the user reads the form and types their password,
    // fire fetches at the two endpoints they're most likely to hit right
    // after login (OperatorHome → /api/campaigns, OperatorDashboard →
    // /api/operator/dashboard). Without a cookie the server returns 401
    // and we discard it — but the Vercel Function is now warm so the
    // post-login round-trip skips the cold start. If the user still has
    // a valid operator_session cookie, the Runtime Cache gets populated
    // and the SPA's first data fetch is a hit.
    (function () {
      var warm = function (url) {
        try {
          fetch(url, { credentials: 'same-origin', cache: 'no-store' }).catch(function () {});
        } catch (e) { /* ignore */ }
      };
      warm('/api/campaigns');
      warm('/api/operator/dashboard');
    })();

    // Pre-fetch the SPA shell + entry bundle. Vite emits hashed asset
    // names (index-<hash>.js, vendor-react-<hash>.js …) so this static
    // file can't list them. Workaround: fetch /index.html, parse out the
    // referenced .js / .css URLs, emit <link rel="modulepreload"> for
    // each. By the time the user submits the password the SPA's first
    // chunks are already in cache — post-login first paint skips the
    // bundle download. Cheap (one HTML fetch + N preload hints), idem-
    // potent (force-cache), and silent on failure.
    (function () {
      try {
        fetch('/', { credentials: 'omit', cache: 'force-cache' })
          .then(function (r) { return r.ok ? r.text() : ''; })
          .then(function (html) {
            if (!html) return;
            var re = /<(?:script|link)\b[^>]*(?:src|href)=["']([^"']+\.(?:js|css))["']/g;
            var seen = Object.create(null);
            var m;
            while ((m = re.exec(html))) {
              var url = m[1];
              if (seen[url] || !url.indexOf('http')) continue;
              seen[url] = true;
              var link = document.createElement('link');
              if (url.indexOf('.css', url.length - 4) !== -1) {
                link.rel = 'preload';
                link.as = 'style';
              } else {
                link.rel = 'modulepreload';
              }
              link.href = url;
              document.head.appendChild(link);
            }
          })
          .catch(function () {});
      } catch (e) { /* ignore */ }
    })();
  </script>
  <script>
    (function () {
      var f = document.getElementById('f');
      var pw = document.getElementById('pw');
      var btn = document.getElementById('btn');
      var label = document.getElementById('btn-label');
      var err = document.getElementById('err');
      function dest() {
        try {
          var u = new URL(window.location.href);
          var r = u.searchParams.get('from');
          return r && r.charAt(0) === '/' && r.charAt(1) !== '/' ? r : '/';
        } catch (e) { return '/'; }
      }
      function fail(msg) {
        err.textContent = msg;
        err.classList.remove('hidden');
        btn.disabled = false;
        label.textContent = 'Sign in';
      }
      function busy() {
        err.classList.add('hidden');
        btn.disabled = true;
        label.innerHTML = '<span class="spin" aria-hidden="true"></span> Signing in…';
      }
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        if (btn.disabled) return;
        var password = pw.value;
        if (!password || !password.trim()) return;
        busy();
        fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ password: password }),
          credentials: 'same-origin'
        }).then(function (res) {
          if (res.ok) {
            window.location.href = dest();
            return;
          }
          return res.json().catch(function () { return {}; }).then(function (body) {
            fail((body && body.error) || ('login failed (' + res.status + ')'));
          });
        }).catch(function (e) {
          fail((e && e.message) || 'network error');
        });
      });
    })();
  </script>
</body>
</html>
